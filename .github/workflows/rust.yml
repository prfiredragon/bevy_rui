name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwayland-dev \
          libxkbcommon-dev \
          wayland-protocols \
          pkg-config \
          libegl1-mesa-dev \
          weston
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
