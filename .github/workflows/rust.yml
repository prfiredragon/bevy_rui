name: Rust

on:
  push:
    branches: [ "Test" ]
  pull_request:
    branches: [ "Test" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwayland-dev \
          libxkbcommon-dev \
          wayland-protocols \
          pkg-config \
          libegl1-mesa-dev \
          weston\
          libasound2-dev\
          libudev-dev
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Build
      run: cargo build --example code_editor_demo
